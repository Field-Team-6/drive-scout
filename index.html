                sortedWithinColleges.forEach(college => {
                    const collegeCard = createCompactCollegeCard(college, districtId, userLat, userLng);
                    container.appendChild(collegeCard);
                });
            }
            
            if (nearColleges.length > 0) {
                const nearSection = document.createElement('div');
                nearSection.innerHTML = '<h3 style="margin: 20px 0 15px 0; color: #333; border-bottom: 2px solid #764ba2; padding-bottom: 8px;">COLLEGES NEAR ' + districtId + '</h3>';
                container.appendChild(nearSection);
                
                const sortedNearColleges = sortCollegesByDistance(nearColleges);
                sortedNearColleges.forEach(college => {
                    const collegeCard = createCompactCollegeCard(college, districtId, userLat, userLng);
                    container.appendChild(collegeCard);
                });
            }
        }
        
        function createCompactCollegeCard(college, districtId, userLat, userLng) {
            const card = document.createElement('div');
            card.className = 'college-card-compact';
            
            const suitabilityColor = getSuitabilityColor(college.suitability);
            const districtCode = districtId.replace('-', '');
            const state = Object.keys(districtMappings).find(s => districtMappings[s].includes(districtId));
            
            // Calculate distance if user location available
            let distanceText = '';
            if (userLat && userLng && college.lat && college.lng) {
                const distance = calculateDistance(userLat, userLng, college.lat, college.lng);
                distanceText = ` • <strong style="color: #667eea;">${distance.toFixed(1)} mi away</strong>`;
            }
            
            card.innerHTML = `
                <div class="college-name">${college.name}${distanceText}</div>
                <div class="college-details">
                    <strong>Type:</strong> ${college.type || 'College'} (${college.publicPrivate || 'Unknown'})<br>
                    <strong>Enrollment:</strong> ${college.enrollment ? college.enrollment.toLocaleString() : 'Unknown'}<br>
                    <strong>Suitability:</strong> <span style="color: ${suitabilityColor}; font-weight: bold;">${college.suitability || 'Medium'}</span>
                </div>
                <div class="college-actions">
                    <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent((college.streetAddress || college.address || college.name) + ', ' + (college.city || college.addressCity || '') + ', ' + (college.state || ''))}" target="_blank" class="btn btn-primary">🗺️ Directions</a>
                    <button class="btn btn-tertiary" onclick="openMobilizeWithAutoFill('${districtId}', '${college.name.replace(/'/g, "\\'")}', '${state}', '${districtCode}')">🗳️ Set Up Voter Drive</button>
                </div>
            `;
            
            return card;
        }

        // CLOSEST DISTRICTS FUNCTIONALITY
        function findClosestDistricts() {
            if (!navigator.geolocation) {
                alert('Geolocation is not supported by this browser.');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                async function(position) {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;
                    
                    console.log('📍 User location found:', userLat, userLng);
                    window.lastUserLocation = { lat: userLat, lng: userLng };
                    
                    await displayClosestDistricts(userLat, userLng);
                },
                function(error) {
                    console.log('Geolocation error:', error);
                    let errorMessage = 'Could not get your location. ';
                    if (error.code === 1) {
                        errorMessage += 'Please allow location access and try again.';
                    } else if (error.code === 2) {
                        errorMessage += 'Location unavailable.';
                    } else {
                        errorMessage += 'Location timeout.';
                    }
                    alert(errorMessage);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 300000
                }
            );
        }

        async function searchByLocation() {
            const locationInput = document.getElementById('locationInput');
            const query = locationInput.value.trim();
            
            if (!query) {
                alert('Please enter a location');
                return;
            }
            
            try {
                // Use Nominatim geocoding service
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&countrycodes=us`);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lng = parseFloat(data[0].lon);
                    
                    console.log('📍 Geocoded location:', lat, lng);
                    window.lastUserLocation = { lat: lat, lng: lng };
                    
                    await displayClosestDistricts(lat, lng);
                } else {
                    alert('Location not found. Please try a different search term.');
                }
            } catch (error) {
                console.log('Geocoding error:', error);
                alert('Error finding location. Please try again.');
            }
        }

        async function displayClosestDistricts(userLat, userLng) {
            try {
                // Hide other sections
                const mapContainer = document.getElementById('mapContainer');
                const collegeList = document.getElementById('collegeList');
                const stats = document.getElementById('stats');
                
                if (mapContainer) mapContainer.style.display = 'none';
                if (collegeList) collegeList.style.display = 'none';
                if (stats) stats.style.display = 'none';
                
                // Calculate distances to all districts
                const allDistricts = Object.keys(districtData);
                const districtsWithDistance = [];
                
                for (const districtId of allDistricts) {
                    const districtInfo = districtData[districtId];
                    if (districtInfo && districtInfo.center) {
                        const distance = calculateDistance(userLat, userLng, districtInfo.center[0], districtInfo.center[1]);
                        districtsWithDistance.push({
                            district: districtId,
                            distance: distance,
                            info: districtInfo
                        });
                    }
                }
                
                // Sort by distance and show results
                districtsWithDistance.sort((a, b) => a.distance - b.distance);
                const districts = districtsWithDistance.slice(0, 5);
                
                displayClosestDistrictsResults(districts, userLat, userLng);
                
            } catch (error) {
                console.log('Error displaying closest districts:', error);
                alert('Error finding closest districts. Please try again.');
            }
        }

        function displayClosestDistrictsResults(districts, userLat, userLng) {
            const resultsContainer = document.getElementById('closestDistrictsResults');
            
            let cardsHTML = '<div class="closest-districts-container">';
            cardsHTML += '<h2 style="text-align: center; color: #ffd700; margin-bottom: 25px;">🎯 Closest Swing Districts</h2>';
            
            districts.forEach((item, index) => {
                const districtInfo = item.info;
                
                cardsHTML += `
                    <div class="district-card">
                        <div class="district-header">
                            <div class="district-title">${item.district}</div>
                            <div class="distance-badge">${item.distance.toFixed(1)} miles away</div>
                        </div>
                        <div class="district-info">
                            ${districtInfo.rep} (${districtInfo.party}) • ${districtInfo.action}
                        </div>
                        <div style="text-align: center;">
                            <button onclick="showDistrictCampuses('${item.district}')" style="background: #667eea; color: white; padding: 8px 16px; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: bold;">
                                Show campuses
                            </button>
                        </div>
                        <div id="district-content-${item.district}" style="display: none; margin-top: 15px;">
                            <!-- Map and college list will be inserted here -->
                        </div>
                    </div>
                `;
            });
            
            // Store current count for progressive loading
            window.currentDistrictCount = districts.length;
            
            // Add buttons for more districts and hide
            cardsHTML += `
                <div style="text-align: center; margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px;">
                    <button onclick="showMoreDistrictsFromGeocode()" style="background: #764ba2; color: white; padding: 8px 20px; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: bold; margin-bottom: 10px;">
                        Show 5 More Districts
                    </button>
                    <br>
                    <button onclick="hideClosestDistricts()" style="background: #666; color: white; padding: 8px 20px; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: bold;">
                        Hide Districts
                    </button>
                </div>
            `;
            
            resultsContainer.innerHTML = cardsHTML;
            
            // Hide the location input section
            const inputSection = document.getElementById('locationInputSection');
            if (inputSection) {
                inputSection.style.display = 'none';
            }
        }
        
        function showMoreDistrictsFromGeocode() {
            if (!window.lastUserLocation) {
                alert('Location data not available. Please search again.');
                return;
            }
            
            const userLat = window.lastUserLocation.lat;
            const userLng = window.lastUserLocation.lng;
            const currentCount = window.currentDistrictCount || 5;
            
            // Get all districts with distances
            const allDistricts = Object.keys(districtData);
            const districtsWithDistance = [];
            
            for (const districtId of allDistricts) {
                const districtInfo = districtData[districtId];
                if (districtInfo && districtInfo.center) {
                    const distance = calculateDistance(userLat, userLng, districtInfo.center[0], districtInfo.center[1]);
                    districtsWithDistance.push({
                        district: districtId,
                        distance: distance,
                        info: districtInfo
                    });
                }
            }
            
            // Sort by distance and get next 5
            districtsWithDistance.sort((a, b) => a.distance - b.distance);
            const nextDistricts = districtsWithDistance.slice(currentCount, currentCount + 5);
            
            if (nextDistricts.length === 0) {
                alert('No more districts to show.');
                return;
            }
            
            // Add new districts to existing results
            const resultsContainer = document.getElementById('closestDistrictsResults');
            const existingContainer = resultsContainer.querySelector('.closest-districts-container');
            
            if (existingContainer) {
                // Remove the buttons section
                const buttonsSection = existingContainer.querySelector('div:last-child');
                if (buttonsSection) {
                    buttonsSection.remove();
                }
                
                // Add new district cards
                nextDistricts.forEach((item) => {
                    const districtInfo = item.info;
                    const cardHTML = `
                        <div class="district-card">
                            <div class="district-header">
                                <div class="district-title">${item.district}</div>
                                <div class="distance-badge">${item.distance.toFixed(1)} miles away</div>
                            </div>
                            <div class="district-info">
                                ${districtInfo.rep} (${districtInfo.party}) • ${districtInfo.action}
                            </div>
                            <div style="text-align: center;">
                                <button onclick="showDistrictCampuses('${item.district}')" style="background: #667eea; color: white; padding: 8px 16px; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: bold;">
                                    Show campuses
                                </button>
                            </div>
                            <div id="district-content-${item.district}" style="display: none; margin-top: 15px;">
                                <!-- Map and college list will be inserted here -->
                            </div>
                        </div>
                    `;
                    existingContainer.insertAdjacentHTML('beforeend', cardHTML);
                });
                
                // Update count
                window.currentDistrictCount = currentCount + nextDistricts.length;
                
                // Re-add buttons section if there are more districts
                const remainingCount = allDistricts.length - window.currentDistrictCount;
                if (remainingCount > 0) {
                    const buttonsHTML = `
                        <div style="text-align: center; margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px;">
                            <button onclick="showMoreDistrictsFromGeocode()" style="background: #764ba2; color: white; padding: 8px 20px; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: bold; margin-bottom: 10px;">
                                Show 5 More Districts
                            </button>
                            <br>
                            <button onclick="hideClosestDistricts()" style="background: #666; color: white; padding: 8px 20px; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: bold;">
                                Hide Districts
                            </button>
                        </div>
                    `;
                    existingContainer.insertAdjacentHTML('beforeend', buttonsHTML);
                } else {
                    // Just add hide button
                    const buttonsHTML = `
                        <div style="text-align: center; margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px;">
                            <button onclick="hideClosestDistricts()" style="background: #666; color: white; padding: 8px 20px; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: bold;">
                                Hide Districts
                            </button>
                        </div>
                    `;
                    existingContainer.insertAdjacentHTML('beforeend', buttonsHTML);
                }
            }
        }
        
        function hideClosestDistricts() {
            const resultsContainer = document.getElementById('closestDistrictsResults');
            resultsContainer.innerHTML = '';
            
            // Show the location input section again if it was hidden
            const inputSection = document.getElementById('locationInputSection');
            if (inputSection && inputSection.style.display === 'none') {
                inputSection.style.display = 'block';
            }
        }

        // Utility function to calculate distance between two points
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 3959; // Radius of the Earth in miles
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Mobilize integration
        function openMobilizeWithAutoFill(district, collegeName, state, districtCode) {
            const mobilizeUrl = `https://mobilize.us/create-event/?auto_fill_title=Voter%20Drive%20at%20${encodeURIComponent(collegeName)}%20in%20${district}&auto_fill_location=${encodeURIComponent(collegeName)}%2C%20${encodeURIComponent(state)}&auto_fill_description=Join%20us%20for%20a%20voter%20drive%20at%20${encodeURIComponent(collegeName)}%20in%20swing%20district%20${district}!%20Help%20register%20students%20and%20boost%20turnout%20in%20this%20crucial%20district.`;
            window.open(mobilizeUrl, '_blank');
        }

        function getBoundaryFile(state) {
            const boundaryFiles = {
                'Alaska': 'data/boundaries/alaska_districts_119th.json',
                'Arizona': 'data/boundaries/arizona_districts_119th.json',
                'California': 'data/boundaries/california_districts_119th.json',
                'Colorado': 'data/boundaries/colorado_districts_119th.json',

            };

        }
        
        function addNationalDistrictBoundaries(boundariesData) {
            // Style function for national district boundaries
            function nationalDistrictStyle(feature) {
                const districtId = getDistrictId(feature);
                const districtInfo = districtData[districtId];
                
                // Default styling for non-swing districts
                let color = '#999999';
                let weight = 1;
                let opacity = 0.2;
                let fillColor = 'transparent';
                let fillOpacity = 0;
                
                // Style swing districts based on party and action
                if (districtInfo) {
                    if (districtInfo.action === 'FLIP') {
                        color = '#DC143C'; // Red for flip districts (targeting Republicans)
                        fillColor = '#DC143C';
                        weight = 2;
                        opacity = 0.8;
                        fillOpacity = 0.3;
                    } else if (districtInfo.action === 'HOLD') {
                        color = '#4169E1'; // Blue for Democratic holds
                        fillColor = '#4169E1';
                        weight = 2;
                        opacity = 0.8;
                        fillOpacity = 0.3;
                    }
                }
                
                return {
                    color: color,
                    weight: weight,
                    opacity: opacity,
                    fillColor: fillColor,
                    fillOpacity: fillOpacity,
                    dashArray: '',
                    className: districtInfo ? 'swing-district' : 'non-swing-district'
                };
            }
            
            // Create popup content for districts
            function nationalDistrictPopup(feature, layer) {
                const districtId = getDistrictId(feature);
                const districtInfo = districtData[districtId];
                
                let popupContent = '<div style="max-width: 240px; text-align: center; padding: 8px; margin: 0;">';
                popupContent += '<div style="font-weight: bold; margin-bottom: 8px; color: #333; font-size: 1rem; line-height: 1.2;">' + districtId + '</div>';
                
                if (districtInfo) {
                    popupContent += '<div style="font-size: 0.9rem; color: #666; margin-bottom: 12px; line-height: 1.3;">';
                    popupContent += 'Rep. ' + districtInfo.rep + ' (' + districtInfo.party + ')<br>';
                    popupContent += districtInfo.action + ' • ' + districtInfo.pvi;
                    popupContent += '</div>';
                    popupContent += '<button onclick="switchToDistrict(\'' + districtId + '\')" style="background: #667eea; color: white; padding: 6px 12px; border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-weight: bold;">View ' + districtId + '</button>';
                } else {
                    popupContent += '<div style="font-size: 0.9rem; color: #666; margin-bottom: 12px;">Not a target district</div>';
                }
                
                popupContent += '</div>';
                
                layer.bindPopup(popupContent, { maxWidth: 280 });
            }
            
            // Add district boundaries to map
            if (map.nationalDistrictLayer) {
                map.removeLayer(map.nationalDistrictLayer);
            }
            
            map.nationalDistrictLayer = L.geoJSON(boundariesData, {
                style: nationalDistrictStyle,
                onEachFeature: nationalDistrictPopup
            });
            
            map.nationalDistrictLayer.addTo(map);
            console.log('📍 Added national district boundaries to map');
        }

        // Initialize app when page loads
        document.addEventListener('DOMContentLoaded', function() {
            initializeApp();
        });
    </script>
