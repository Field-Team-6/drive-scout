<!DOCTYPE html>
<html lang="en">

    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'raleway-v2', 'Raleway', sans-serif;
            font-style: normal;
            font-weight: 400;
            background: #5f6360;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* COMPLETELY HIDE THE CONTROLS SECTION */
        .controls {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            height: 0 !important;
            overflow: hidden !important;
            position: absolute !important;
            left: -9999px !important;
            top: -9999px !important;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        select, input[type="file"] {
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            color: #333;
            transition: border-color 0.3s ease;
        }

        select:focus, input[type="file"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .main-action-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            margin: 10px;
            min-width: 300px;
        }

        .main-action-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .main-action-button:active {
            transform: translateY(-1px);
        }

        .loading-button {
            background: #ccc !important;
            cursor: not-allowed !important;
            transform: none !important;
        }

        .stats {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            color: white;
        }

        .stat-card h3 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #ffd700;
        }

        .stat-card p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .map-container {
            display: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #map {
            height: 500px;
            width: 100%;
        }

        .college-list {
            display: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .college-list h2 {
            margin-bottom: 20px;
            color: #ffd700;
            text-align: center;
        }

        .college-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .college-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.15);
        }

        .college-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffd700;
        }

        .college-details {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .college-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-secondary:hover {
            background: #38a169;
            transform: translateY(-1px);
        }

        .btn-tertiary {
            background: #ed8936;
            color: white;
        }

        .btn-tertiary:hover {
            background: #dd6b20;
            transform: translateY(-1px);
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.8);
        }

        .no-data h3 {
            color: #ffd700;
            margin-bottom: 15px;
        }

        .no-data ol {
            text-align: left;
            max-width: 500px;
            margin: 20px auto;
        }

        .no-data li {
            margin-bottom: 8px;
            line-height: 1.4;
        }

        /* Loading spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .college-actions {
                flex-direction: column;
            }

            .btn {
                justify-content: center;
            }

            #map {
                height: 400px;
            }
        }

        /* District search results styling */
        .closest-districts-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .district-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.2s ease;
        }

        .district-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.15);
        }

        .district-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .district-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffd700;
        }

        .distance-badge {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .district-info {
            font-size: 0.95rem;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .district-map {
            width: 100%;
            height: 300px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .college-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .section-header {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffd700;
            margin: 20px 0 15px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        /* Compact college cards for district view */
        .college-card-compact {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.2s ease;
        }

        .college-card-compact:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.15);
        }

        .college-card-compact .college-name {
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .college-card-compact .college-details {
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .college-card-compact .college-actions {
            gap: 8px;
        }

        .college-card-compact .btn {
            padding: 6px 12px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗳️ Drive Scout</h1>
            <p>Hold a college voter drive in a swing district.<br><em>Drive Scout shows you where!</em></p>
            
            <!-- IMPROVED PRIMARY ACTION BUTTON -->
            <div style="background: transparent; padding: 0; margin: 8px 0; text-align: center;">
                <button id="findClosestCampusesBtn" onclick="findClosestCampuses()" class="main-action-button">
                    🔍 Find closest swing district campuses!
                </button>
                <div style="color: white; font-size: 1.1rem; opacity: 0.9; margin: 10px 0;">
                    Or for advanced activists:
                </div>
                <button id="fullControlsBtn" onclick="toggleFullControls()" style="background: #667eea; color: white; padding: 12px 25px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold;">
                    Full Drive Scout Controls
                </button>
                
                <!-- EXPANDABLE CONTROLS SECTION -->
                <div id="advancedControlsSection" style="display: none; background: rgba(255,255,255,0.1); padding: 20px; margin-top: 15px; border-radius: 10px;">
                    
                    <!-- Closest Districts Button -->
                    <div style="text-align: center; margin-bottom: 20px;">
                        <button onclick="findClosestDistricts()" style="background: #764ba2; color: white; padding: 12px 25px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold;">
                            Find closest swing districts
                        </button>
                    </div>
                    
                    <!-- Different Location Search -->
                    <div style="text-align: center; margin-bottom: 20px;">
                        <button id="locationSearchBtn" onclick="toggleLocationSearch()" style="background: #a24b66; color: white; padding: 12px 25px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold;">
                            Find swing districts closest to a different location
                        </button>
                        <div id="locationInputSection" style="display: none; margin-top: 10px;">
                            <input type="text" id="locationInput" placeholder="Enter city, state OR zip code" style="padding: 10px; border: 2px solid #e1e5e9; border-radius: 8px; font-size: 1rem; margin-right: 10px; width: 250px;">
                            <button onclick="searchByLocation()" style="background: #a24b66; color: white; padding: 10px 20px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold;">
                                Search
                            </button>
                        </div>
                    </div>
                    
                    <!-- District Selection -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="stateSelect">Select State:</label>
                            <select id="stateSelect" onchange="updateDistricts()">
                                <option value="">Choose a state</option>
                                <option value="Alaska">Alaska</option>
                                <option value="Arizona">Arizona</option>
                                <option value="California">California</option>
                                <option value="Colorado">Colorado</option>
                                <option value="Connecticut">Connecticut</option>
                                <option value="Florida">Florida</option>
                                <option value="Nevada">Nevada</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="districtSelect">Select District:</label>
                            <select id="districtSelect" onchange="loadSelectedDistrict()">
                                <option value="">Choose a district</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Load button -->
                    <div style="text-align: center; margin-top: 20px;">
                        <button onclick="loadSelectedDistrict()" class="button">
                            Load District Data
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- OLD HIDDEN CONTROLS (keeping for backward compatibility) -->
        <div class="controls">
            <div class="form-row">
                <div class="form-group">
                    <label for="stateSelectHidden">Select State:</label>
                    <select id="stateSelectHidden">
                        <option value="">Choose a state</option>
                        <option value="Alaska">Alaska</option>
                        <option value="Arizona">Arizona</option>
                        <option value="California">California</option>
                        <option value="Colorado">Colorado</option>
                        <option value="Connecticut">Connecticut</option>
                        <option value="Florida">Florida</option>
                        <option value="Nevada">Nevada</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="districtSelectHidden">Select District:</label>
                    <select id="districtSelectHidden">
                        <option value="">Choose a district</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="csvFile">Upload CSV File (optional):</label>
                <input type="file" id="csvFile" accept=".csv" onchange="handleFileUpload()">
            </div>
            <button onclick="loadData()" class="button">Load Data</button>
        </div>

        <!-- Stats -->
        <div id="stats" class="stats">
            <div class="stat-card">
                <h3 id="totalColleges">0</h3>

            </div>
            <div class="stat-card">

            </div>
            <div class="stat-card">

            </div>
        </div>

        <!-- Map -->
        <div id="mapContainer" class="map-container">
            <div id="map"></div>
        </div>

        <!-- College List -->
        <div id="collegeList" class="college-list">
            <h2 id="collegeListTitle">Colleges & Universities</h2>
            <div id="collegeItems"></div>
        </div>

        <!-- Closest Districts Results -->
        <div id="closestDistrictsResults"></div>
    </div>

        // Initialize the application
        function initializeApp() {
            console.log('🚀 Initializing Drive Scout application...');
            
            // Initialize the map
            initializeMap();
            
            // Initialize state data
            Object.keys(districtMappings).forEach(function(state) {
                collegeData[state] = {};
            });
            
            console.log('✅ Application initialized successfully');
        }

        function initializeMap() {
            // Initialize main map
            map = L.map('map').setView([39.8283, -98.5795], 4);
            
            // Add tile layer
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            
            console.log('🗺️ Map initialized');
        }

        function toggleFullControls() {
            const section = document.getElementById('advancedControlsSection');
            const btn = document.getElementById('fullControlsBtn');
            
            if (section.style.display === 'none') {
                section.style.display = 'block';
                btn.textContent = 'Hide Full Drive Scout Controls';
            } else {
                section.style.display = 'none';
                btn.textContent = 'Full Drive Scout Controls';
            }
        }

        function toggleLocationSearch() {
            const section = document.getElementById('locationInputSection');
            const btn = document.getElementById('locationSearchBtn');
            
            if (section.style.display === 'none') {
                section.style.display = 'block';
                btn.textContent = 'Hide Location Search';
            } else {
                section.style.display = 'none';
                btn.textContent = 'Find swing districts closest to a different location';
            }
        }

        function updateDistricts() {
            const stateSelect = document.getElementById('stateSelect');
            const districtSelect = document.getElementById('districtSelect');
            const selectedState = stateSelect.value;
            
            // Clear existing options
            districtSelect.innerHTML = '<option value="">Choose a district</option>';
            
            if (selectedState && districtMappings[selectedState]) {
                districtMappings[selectedState].forEach(function(district) {
                    const option = document.createElement('option');
                    option.value = district;
                    option.textContent = district;
                    districtSelect.appendChild(option);
                });
            }
        }

        function clearMarkers() {
            markers.forEach(function(marker) {
                if (map && map.hasLayer(marker)) {
                    map.removeLayer(marker);
                }
            });
            markers = [];

            if (userLocationMarker && map && map.hasLayer(userLocationMarker)) {
                map.removeLayer(userLocationMarker);
                userLocationMarker = null;
            }
        }

        function clearMap() {
            clearMarkers();
            
            if (map && map.districtLayer) {
                map.removeLayer(map.districtLayer);
                map.districtLayer = null;
            }
        }

        function updateStats(colleges) {
            if (!colleges || colleges.length === 0) return;
            
            const totalColleges = colleges.length;
            const publicColleges = colleges.filter(function(c) { 
                return c.publicPrivate && c.publicPrivate.toLowerCase() === 'public'; 
            }).length;
            
            let totalEnrollment = 0;
            let enrollmentCount = 0;
            
            colleges.forEach(function(college) {
                if (college.enrollment && !isNaN(college.enrollment)) {
                    totalEnrollment += parseInt(college.enrollment);
                    enrollmentCount++;
                }
            });
            
            const averageEnrollment = enrollmentCount > 0 ? Math.round(totalEnrollment / enrollmentCount) : 0;
            
            document.getElementById('totalColleges').textContent = totalColleges;
            document.getElementById('averageEnrollment').textContent = averageEnrollment.toLocaleString();
            document.getElementById('publicColleges').textContent = publicColleges;
        }

        async function loadData() {
            const stateSelect = document.getElementById('stateSelectHidden');
            const districtSelect = document.getElementById('districtSelectHidden');
            const csvFile = document.getElementById('csvFile');
            
            const selectedState = stateSelect.value;
            const selectedDistrict = districtSelect.value;
            
            if (!selectedState || !selectedDistrict) {
                alert('Please select both state and district');
                return;
            }
            
            clearMap();
            
            try {
                let colleges = [];
                
                if (csvFile.files[0]) {
                    colleges = await handleCSVFile(csvFile.files[0], selectedDistrict);
                } else {
                    await ensureDistrictDataLoaded(selectedDistrict);
                    colleges = collegeData[selectedState][selectedDistrict] || [];
                }
                
                if (colleges.length === 0) {
                    showNoData(selectedState, selectedDistrict);
                    return;
                }
                
                updateStats(colleges);
                showResults(colleges, selectedDistrict);
                await loadDistrictBoundaries(selectedState);
                addMarkersToMap(colleges);
                addDistrictBoundariesToMap(selectedDistrict);
                
            } catch (error) {
                console.error('Error loading data:', error);
                alert('Error loading data. Please check the console for details.');
            }
        }

        async function loadSelectedDistrict() {
            const stateSelect = document.getElementById('stateSelect');
            const districtSelect = document.getElementById('districtSelect');
            
            const selectedState = stateSelect.value;
            const selectedDistrict = districtSelect.value;
            
            if (!selectedState || !selectedDistrict) {
                alert('Please select both state and district');
                return;
            }
            
            clearMap();
            
            try {
                await ensureDistrictDataLoaded(selectedDistrict);
                
                // Get college data for this district
                const collegeDataForDistrict = collegeData[selectedState] && collegeData[selectedState][selectedDistrict] ? 
                    collegeData[selectedState][selectedDistrict] : [];
                
                let allColleges = [];
                let withinColleges = [];
                let nearColleges = [];

                // Handle both array format and object format
                if (Array.isArray(collegeDataForDistrict)) {
                    allColleges = collegeDataForDistrict;
                    withinColleges = collegeDataForDistrict;
                } else if (collegeDataForDistrict && typeof collegeDataForDistrict === 'object') {
                    withinColleges = collegeDataForDistrict.within || [];
                    nearColleges = collegeDataForDistrict.near || [];
                    allColleges = withinColleges.concat(nearColleges);
                }
                
                // Filter out invalid colleges
                allColleges = allColleges.filter(college => college && college.name && college.lat && college.lng);
                withinColleges = withinColleges.filter(college => college && college.name && college.lat && college.lng);
                nearColleges = nearColleges.filter(college => college && college.name && college.lat && college.lng);
                
                if (allColleges.length === 0) {
                    showNoData(selectedState, selectedDistrict);
                    return;
                }
                
                // Show and update main map and college list
                updateStats(allColleges);
                
                const statsElement = document.getElementById('stats');
                const mapContainer = document.getElementById('mapContainer');
                const collegeList = document.getElementById('collegeList');
                
                if (statsElement) statsElement.style.display = 'grid';
                if (mapContainer) mapContainer.style.display = 'block';
                if (collegeList) collegeList.style.display = 'block';
                
                // Clear existing markers and boundaries first
                clearMarkers();
                if (map && map.districtLayer) {
                    map.removeLayer(map.districtLayer);
                    map.districtLayer = null;
                }
                
                // Load district boundaries for the selected state
                await loadDistrictBoundaries(selectedState);
                
                // Add markers and boundaries with proper timing
                setTimeout(function() {
                    // Add college markers first
                    addMarkersToMap(allColleges);
                    
                    // Then add district boundaries and zoom to the selected district
                    addDistrictBoundariesToMap(selectedDistrict);
                    
                    // Force zoom to the specific district after boundaries are added
                    setTimeout(() => {
                        zoomToSpecificDistrict(selectedDistrict);
                    }, 200);
                }, 300);
                
                displayCollegeListWithSections(selectedDistrict, withinColleges, nearColleges);
                checkUpcomingDrives(selectedDistrict);
                
            } catch (error) {
                console.log('❌ Error loading new district data:', error);
            }
        }
        
        function zoomToSpecificDistrict(districtId) {
            if (!map || !districtBoundaries) return;
            
            // Find the selected district in the boundaries data
            const selectedFeatures = districtBoundaries.data.features.filter(feature => {
                const featureDistrictId = getDistrictId(feature);
                return featureDistrictId === districtId;
            });
            
            if (selectedFeatures.length > 0) {
                const selectedLayer = L.geoJSON(selectedFeatures);
                const bounds = selectedLayer.getBounds();
                
                // Fit the map to the selected district with padding
                map.fitBounds(bounds, { 
                    padding: [40, 40],
                    maxZoom: 11
                });
                
                console.log('🎯 Map zoomed to district', districtId);
            } else {
                // Fallback to district center if boundaries not found
                const districtInfo = districtData[districtId];
                if (districtInfo && districtInfo.center) {
                    map.setView(districtInfo.center, 9);
                    console.log('🎯 Map centered on district center for', districtId);
                }
            }
        }

        async function ensureDistrictDataLoaded(district) {
            if (loadedDistricts.has(district)) {
                console.log('✅ Data already loaded for ' + district);
                return;
            }
            
            try {
                console.log('📥 Loading data for ' + district + '...');
                
                // Try multiple possible filenames
                const possibleFilenames = [
                    'data/' + district + '.csv',
                    'data/' + district.replace('-', '') + '.csv'
                ];
                
                let csvText = null;
                let successfulUrl = null;
                
                for (const filename of possibleFilenames) {
                    try {
                        console.log('🔍 Trying to load:', filename);
                        const response = await fetch(filename);
                        if (response.ok) {
                            csvText = await response.text();
                            successfulUrl = filename;
                            console.log('✅ Successfully loaded:', filename);
                            break;
                        }
                    } catch (error) {
                        console.log('Failed to load ' + filename + ':', error.message);
                    }
                }

                if (!csvText) {
                    console.log('No CSV file found for ' + district);
                    loadedDistricts.add(district);
                    return;
                }

                const colleges = await parseCSV(csvText, district);
                
                const state = Object.keys(districtMappings).find(function(s) {
                    return districtMappings[s].includes(district);
                });

                if (state && colleges) {
                    collegeData[state][district] = colleges;
                    console.log('Loaded data for ' + district + ' from ' + successfulUrl);
                }

                loadedDistricts.add(district);
            } catch (error) {
                console.log('Error loading data for ' + district + ':', error);
                loadedDistricts.add(district);
            }
        }

        async function loadDistrictBoundaries(state) {
            const boundaryFiles = {
                'Alaska': 'data/boundaries/alaska_districts_119th.json',
                'Arizona': 'data/boundaries/arizona_districts_119th.json',
                'California': 'data/boundaries/california_districts_119th.json',
                'Colorado': 'data/boundaries/colorado_districts_119th.json',
                'Connecticut': 'data/boundaries/connecticut_districts_119th.json',
                'Florida': 'data/boundaries/florida_districts_119th.json',
                'Nevada': 'data/boundaries/nevada_districts_119th.json'
            };
            
            const boundaryFile = boundaryFiles[state];
            if (!boundaryFile) {
                console.log('📍 No boundary file configured for state:', state);
                return;
            }
            
            if (districtBoundaries && districtBoundaries.state === state) {
                console.log('📍 District boundaries already loaded for', state);
                return;
            }
            
            try {
                console.log('📍 Loading district boundaries for', state, 'from', boundaryFile);
                const response = await fetch(boundaryFile);
                
                if (!response.ok) {
                    console.log('📍 Could not load boundary file for', state, '- status:', response.status);
                    return;
                }
                
                const boundariesData = await response.json();
                districtBoundaries = {
                    state: state,
                    data: boundariesData
                };
                
                console.log('📍 Successfully loaded district boundaries for', state);
                console.log('📍 Loaded', boundariesData.features.length, 'district boundaries');
                
            } catch (error) {
                console.log('📍 Error loading district boundaries for', state, ':', error);
            }
        }

        function addDistrictBoundariesToMap(selectedDistrict = null) {
            if (!map || !districtBoundaries) return;
            
            // Remove existing district layer
            if (map.districtLayer) {
                map.removeLayer(map.districtLayer);
                map.districtLayer = null;
            }
            
            currentSelectedDistrict = selectedDistrict;
            
            // Style function for districts
            function districtStyle(feature) {
                const districtId = getDistrictId(feature);
                const districtInfo = districtData[districtId];
                const isSelected = selectedDistrict && districtId === selectedDistrict;
                
                // Default styling
                let color = '#999999';
                let weight = 1;
                let opacity = 0.3;
                let fillColor = 'transparent';
                let fillOpacity = 0;
                
                // Style swing districts based on party and action
                if (districtInfo) {
                    if (districtInfo.action === 'FLIP') {
                        color = districtInfo.party === 'D' ? '#4169E1' : '#DC143C'; // Blue for Dem flips, Red for GOP flips
                        weight = 2;
                    } else if (districtInfo.action === 'HOLD') {
                        color = districtInfo.party === 'D' ? '#4169E1' : '#DC143C'; // Blue for Dem holds
                        weight = 3;
                    }
                    opacity = 0.6;
                }
                
                // HIGHLIGHT SELECTED DISTRICT
                if (isSelected) {
                    weight = 5;
                    opacity = 1.0;
                    fillOpacity = 0.15;
                    fillColor = color;
                }
                
                return {
                    color: color,
                    weight: weight,
                    opacity: opacity,
                    fillColor: fillColor,
                    fillOpacity: fillOpacity
                };
            }
            
            // Create popup content for districts
            function onEachDistrict(feature, layer) {
                const districtId = getDistrictId(feature);
                const districtInfo = districtData[districtId];
                const isSelected = selectedDistrict && districtId === selectedDistrict;
                
                let popupContent = '<div style="max-width: 240px; text-align: center; padding: 8px; margin: 0;">';
                popupContent += '<div style="font-weight: bold; margin-bottom: 8px; color: #333; font-size: 1rem; line-height: 1.2;">';
                popupContent += districtId;
                if (isSelected) {
                    popupContent += '<br><span style="background: #4CAF50; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.8rem; margin-top: 4px; display: inline-block;">CURRENT</span>';
                }
                popupContent += '</div>';
                
                if (districtInfo) {
                    popupContent += '<div style="font-size: 0.9rem; color: #666; margin-bottom: 12px; line-height: 1.3;">';
                    popupContent += 'Rep. ' + districtInfo.rep + ' (' + districtInfo.party + ')<br>';
                    popupContent += districtInfo.action + ' • ' + districtInfo.pvi;
                    popupContent += '</div>';
                }
                
                if (!isSelected) {
                    popupContent += '<button onclick="switchToDistrict(\'' + districtId + '\')" style="background: #667eea; color: white; padding: 6px 12px; border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-weight: bold;">Switch to ' + districtId + '</button>';
                }
                
                popupContent += '</div>';
                
                layer.bindPopup(popupContent, { maxWidth: 280 });
            }
            
            // Add district boundaries to map
            map.districtLayer = L.geoJSON(districtBoundaries.data, {
                style: districtStyle,
                onEachFeature: onEachDistrict
            });
            
            map.districtLayer.addTo(map);
            console.log('📍 Added district boundaries to map');
        }

        function getDistrictId(feature) {
            if (feature.properties.NAMELSAD === "Congressional District (at Large)") {
                const stateCode = feature.properties.STATEFP;
                if (stateCode === "02") return "AK-AL"; // Alaska
                return null;
            }
            
            const stateCode = feature.properties.STATEFP;
            const districtCode = feature.properties.CD119FP;
            
            const stateMapping = {
                '04': 'AZ',
                '06': 'CA', 
                '08': 'CO',
                '09': 'CT',
                '12': 'FL',
                '32': 'NV'
            };
            
            const stateAbbr = stateMapping[stateCode];
            if (!stateAbbr) return null;
            
            return stateAbbr + '-' + districtCode.padStart(2, '0');
        }

        async function switchToDistrict(districtId) {
            console.log('🔄 Switching to district:', districtId);
            
            // Clear existing results
            clearMap();
            
            try {
                // Load the district data first
                await ensureDistrictDataLoaded(districtId);
                
                // Get state from district mapping
                const state = Object.keys(districtMappings).find(function(s) {
                    return districtMappings[s].includes(districtId);
                });
                
                if (!state) {
                    console.log('❌ Could not find state for district:', districtId);
                    return;
                }
                
                // Get college data for this district
                const collegeDataForDistrict = collegeData[state] && collegeData[state][districtId] ? 
                    collegeData[state][districtId] : [];
                
                let allColleges = [];
                let withinColleges = [];
                let nearColleges = [];

                // Handle both array format and object format
                if (Array.isArray(collegeDataForDistrict)) {
                    allColleges = collegeDataForDistrict;
                    withinColleges = collegeDataForDistrict;
                } else if (collegeDataForDistrict && typeof collegeDataForDistrict === 'object') {
                    withinColleges = collegeDataForDistrict.within || [];
                    nearColleges = collegeDataForDistrict.near || [];
                    allColleges = withinColleges.concat(nearColleges);
                }
                
                // Filter out invalid colleges
                allColleges = allColleges.filter(college => college && college.name && college.lat && college.lng);
                withinColleges = withinColleges.filter(college => college && college.name && college.lat && college.lng);
                nearColleges = nearColleges.filter(college => college && college.name && college.lat && college.lng);
                
                if (allColleges.length === 0) {
                    showNoData(state, districtId);
                    return;
                }
                
                // Update UI elements
                updateStats(allColleges);
                
                const statsElement = document.getElementById('stats');
                const mapContainer = document.getElementById('mapContainer');
                const collegeList = document.getElementById('collegeList');
                
                if (statsElement) statsElement.style.display = 'grid';
                if (mapContainer) mapContainer.style.display = 'block';
                if (collegeList) collegeList.style.display = 'block';
                
                // Load district boundaries for the state
                await loadDistrictBoundaries(state);
                
                // Add markers and boundaries
                setTimeout(function() {
                    addMarkersToMap(allColleges);
                    addDistrictBoundariesToMap(districtId);
                    
                    // Zoom to the selected district
                    setTimeout(() => {
                        zoomToSpecificDistrict(districtId);
                    }, 200);
                }, 300);
                
                displayCollegeListWithSections(districtId, withinColleges, nearColleges);
                checkUpcomingDrives(districtId);
                
                console.log('✅ Successfully switched to district:', districtId);
                
            } catch (error) {
                console.log('❌ Error switching to district:', districtId, error);
            }
        }

        function addMarkersToMap(colleges) {
            clearMarkers();
            
            colleges.forEach(function(college) {
                if (!college.lat || !college.lng || isNaN(college.lat) || isNaN(college.lng)) {
                    return;
                }
                
                const marker = L.marker([college.lat, college.lng], {
                    icon: L.divIcon({
                        html: '🎓',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    })
                });
                
                const popupContent = createPopupContent(college);
                marker.bindPopup(popupContent, { maxWidth: 400 });
                marker.addTo(map);
                markers.push(marker);
            });
            
            if (colleges.length > 0) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        function showResults(colleges, district) {
            const statsElement = document.getElementById('stats');
            const mapContainer = document.getElementById('mapContainer');
            const collegeList = document.getElementById('collegeList');
            
            if (statsElement) statsElement.style.display = 'grid';
            if (mapContainer) mapContainer.style.display = 'block';
            if (collegeList) collegeList.style.display = 'block';
            
            displayCollegeList(colleges, district);
        }

        function displayCollegeListWithSections(districtId, withinColleges, nearColleges) {
            const collegeItems = document.getElementById('collegeItems');
            const collegeListTitle = document.getElementById('collegeListTitle');
            
            if (!collegeItems || !collegeListTitle) return;
            
            collegeListTitle.textContent = `Colleges & Universities in ${districtId}`;
            
            let html = '';
            
            if (withinColleges.length > 0) {
                html += '<h3 style="margin: 20px 0 15px 0; color: #ffd700; border-bottom: 2px solid rgba(255, 255, 255, 0.2); padding-bottom: 8px;">COLLEGES IN ' + districtId + '</h3>';
                withinColleges.forEach(function(college) {
                    html += createCollegeItemHTML(college, districtId);
                });
            }
            
            if (nearColleges.length > 0) {
                html += '<h3 style="margin: 20px 0 15px 0; color: #ffd700; border-bottom: 2px solid rgba(255, 255, 255, 0.2); padding-bottom: 8px;">COLLEGES NEAR ' + districtId + '</h3>';
                nearColleges.forEach(function(college) {
                    html += createCollegeItemHTML(college, districtId);
                });
            }
            
            collegeItems.innerHTML = html;
        }

        function displayCollegeList(colleges, district) {
            const collegeItems = document.getElementById('collegeItems');
            const collegeListTitle = document.getElementById('collegeListTitle');
            
            if (!collegeItems || !collegeListTitle) return;
            
            collegeListTitle.textContent = `Colleges & Universities in ${district}`;
            
            let html = '';
            colleges.forEach(function(college) {
                html += createCollegeItemHTML(college, district);
            });
            
            collegeItems.innerHTML = html;
        }

        function createCollegeItemHTML(college, district) {
            const suitabilityColor = getSuitabilityColor(college.suitability);
            const districtCode = district.replace('-', '');
            const state = Object.keys(districtMappings).find(function(s) {
                return districtMappings[s].includes(district);
            });
            
            return `
                <div class="college-item">
                    <div class="college-name">${college.name}</div>
                    <div class="college-details">
                        <strong>Type:</strong> ${college.type || 'College'} (${college.publicPrivate || 'Unknown'})<br>
                        <strong>Enrollment:</strong> ${college.enrollment ? college.enrollment.toLocaleString() : 'Unknown'}<br>
                        <strong>District:</strong> ${college.district || district} • <strong>Section:</strong> ${college.section || 'Within'}<br>
                        <strong>Suitability:</strong> <span style="color: ${suitabilityColor}; font-weight: bold;">${college.suitability || 'Medium'}</span><br>
                        ${college.hasQuad ? '<strong>Campus Quad:</strong> ✅ Yes' : '<strong>Campus Quad:</strong> ❌ No'}<br>
                        ${college.campusSize ? `<strong>Campus Size:</strong> ${college.campusSize} acres<br>` : ''}
                    </div>
                    <div class="college-actions">
                        <button class="btn btn-secondary" onclick="focusOnCollege(${college.lat}, ${college.lng})">📍 View on Map</button>
                        <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent((college.streetAddress || college.address || college.name) + ', ' + (college.city || college.addressCity || '') + ', ' + (college.state || ''))}" target="_blank" class="btn btn-primary">🗺️ Directions</a>
                        <button class="btn btn-tertiary" onclick="openMobilizeWithAutoFill('${district}', '${college.name.replace(/'/g, "\\'")}', '${state}', '${districtCode}')">🗳️ Set Up Voter Drive</button>
                    </div>
                </div>
            `;
        }

        function getSuitabilityColor(suitability) {
            switch ((suitability || '').toLowerCase()) {
                case 'high': return '#4CAF50';
                case 'medium': return '#FF9800';
                case 'low': return '#F44336';
                default: return '#FF9800';
            }
        }

            const state = Object.keys(districtMappings).find(function(s) {

            });

                '<div style="font-size: 0.9rem; color: #666; margin-bottom: 12px; line-height: 1.4;">' +

                    '<strong>Enrollment:</strong> ' + (college.enrollment ? college.enrollment.toLocaleString() : 'Unknown') + '<br>' +
                    '<strong>District:</strong> ' + district + ' • <strong>Section:</strong> ' + (college.section || 'Within') + '<br>' +
                    '<strong>Suitability:</strong> <span style="color: ' + suitabilityColor + '; font-weight: bold;">' + (college.suitability || 'Medium') + '</span><br>' +

                    (college.campusSize ? '<strong>Campus Size:</strong> ' + college.campusSize + ' acres<br>' : '') +
                '</div>' +

        async function handleCSVFile(file, district) {
            return new Promise(function(resolve, reject) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const csvText = e.target.result;
                        const colleges = await parseCSV(csvText, district);
                        resolve(colleges);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.onerror = function() {
                    reject(new Error('Failed to read file'));
                };
                reader.readAsText(file);
            });
        }

        async function parseCSV(csvText, district) {
            const lines = csvText.split('\n').map(function(line) {
                return line.trim();
            }).filter(function(line) {
                return line.length > 0;
            });
            
            if (lines.length < 2) {
                console.log('⚠️ CSV file appears to be empty or has no data rows');
                return { within: [], near: [] };
            }
            
            // Parse header row
            const headers = parseCSVLine(lines[0]);
            console.log('📋 CSV Headers:', headers);
            
            const colleges = {
                within: [],
                near: []
            };
            
            // Process data rows
            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                
                // Skip empty rows
                if (values.length === 0 || values.every(function(val) { return !val || val.trim() === ''; })) {
                    continue;
                }
                
                // Ensure we have enough values to match headers
                while (values.length < headers.length) {
                    values.push('');
                }
                
                const college = await parseCollegeData(values, headers, district, 'within');
                
                if (college && college.name && college.lat && college.lng) {
                    const targetSection = college.section && college.section.toLowerCase() === 'near' ? 'near' : 'within';
                    colleges[targetSection].push(college);
                    console.log('✅ Added college:', college.name, 'to', targetSection, 'section', 'coords:', college.lat, college.lng);
                } else {
                    console.log('⚠️ Skipped college:', institutionName, 'reason: missing data or coordinates');
                }
            }

            console.log('📊 Parsed', colleges.within.length, 'colleges within', district, 'and', colleges.near.length, 'colleges near', district);
            return colleges;
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            let i = 0;

            while (i < line.length) {
                const char = line[i];
                
                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        current += '"';
                        i += 2;
                        continue;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
                i++;
            }
            
            result.push(current.trim());
            return result.map(function(item) {
                return item.replace(/^"|"$/g, '');
            });
        }

        async function parseCollegeData(values, headers, district, section) {
            const college = {
                name: '',
                district: district,
                section: section,
                enrollment: 2000,
                campusSize: null,
                hasQuad: true,
                suitability: "Medium",
                type: "College",
                publicPrivate: "Public",
                lat: null,
                lng: null
            };

            console.log('🏫 Parsing college with headers:', headers);
            console.log('🏫 Values:', values);

            // Process each column based on header name
            for (let j = 0; j < headers.length; j++) {
                const header = headers[j] ? headers[j].trim() : '';
                const value = values[j] ? values[j].toString().trim() : '';
                
                if (!value) continue;
                
                const headerLower = header.toLowerCase();
                
                // Institution name
                if (headerLower.includes('institution') || headerLower.includes('name') || headerLower.includes('college') || headerLower.includes('university')) {
                    college.name = value;
                }
                // Address fields
                else if (headerLower.includes('address') && !headerLower.includes('city')) {
                    college.address = value;
                    college.streetAddress = value;
                }
                // City
                else if (headerLower.includes('city')) {
                    college.city = value;
                    college.addressCity = value;
                }
                // State
                else if (headerLower.includes('state')) {
                    college.state = value;
                }
                // Latitude - PRIORITIZE DIRECT COORDINATES
                else if (headerLower.includes('latitude') || headerLower === 'lat') {
                    const latValue = parseFloat(value);
                    if (!isNaN(latValue) && latValue >= -90 && latValue <= 90) {
                        college.lat = latValue;
                        console.log('📍 Set latitude from CSV:', latValue);
                    }
                }
                // Longitude - PRIORITIZE DIRECT COORDINATES  
                else if (headerLower.includes('longitude') || headerLower === 'lng' || headerLower === 'lon') {
                    const lngValue = parseFloat(value);
                    if (!isNaN(lngValue) && lngValue >= -180 && lngValue <= 180) {
                        college.lng = lngValue;
                        console.log('📍 Set longitude from CSV:', lngValue);
                    }
                }
                // Enrollment
                else if (headerLower.includes('enrollment')) {
                    const enrollmentValue = parseInt(value.replace(/[^0-9]/g, ''));
                    if (!isNaN(enrollmentValue)) {
                        college.enrollment = enrollmentValue;
                    }
                }
                // Campus size
                else if (headerLower.includes('campus') && headerLower.includes('size')) {
                    const sizeValue = parseInt(value.replace(/[^0-9]/g, ''));
                    if (!isNaN(sizeValue)) {
                        college.campusSize = sizeValue;
                    }
                }
                // Type
                else if (headerLower.includes('type')) {
                    college.type = value;
                }
                // Section
                else if (headerLower.includes('section')) {
                    college.section = value.toLowerCase() === 'near' ? 'near' : 'within';
                }
                // Suitability
                else if (headerLower.includes('suitability')) {
                    college.suitability = value;
                }
                // Notes
                else if (headerLower.includes('notes')) {
                    college.notes = value;
                }
            }

            // If no coordinates found in CSV, skip this college
            if (!college.lat || !college.lng) {
                console.log('⚠️ Skipping college', college.name, '- no coordinates in CSV');
                return null;
            }

            console.log('✅ Successfully parsed college:', college.name, 'at coordinates:', college.lat, college.lng);
            return college;
        }

        function createDistrictMap(mapId, districtId, withinColleges, nearColleges) {
            const mapElement = document.getElementById(mapId);
            if (!mapElement) return;
            
            // Create new map instance
            const districtMap = L.map(mapId);
            
            // Add tile layer
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(districtMap);
            
            // Combine all colleges
            const allColleges = withinColleges.concat(nearColleges);
            const group = new L.featureGroup();
            
            // Add college markers
            allColleges.forEach(college => {
                const marker = L.marker([college.lat, college.lng], {
                    icon: L.divIcon({
                        html: '🎓',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    })
                });
                
                const popupContent = createPopupContent(college);
                marker.bindPopup(popupContent, { maxWidth: 400 });
                marker.addTo(districtMap);
                group.addLayer(marker);
            });
            
            // Load and display district boundaries
            loadDistrictBoundariesForMap(state, districtMap, districtId).then(() => {
                // After boundaries are loaded, fit the map to show the district
                // Add a longer delay for desktop to ensure proper rendering
                setTimeout(() => {
                    fitMapToDistrict(districtMap, districtId);
                    // Force another resize and fit for desktop compatibility
                    setTimeout(() => {
                        districtMap.invalidateSize();
                        fitMapToDistrict(districtMap, districtId);
                    }, 300);
                }, 100);
            });
            
            // Store the map reference for potential future use
            window[`districtMap_${districtId}`] = districtMap;
            
            // Resize the map after a short delay
            setTimeout(() => {
                districtMap.invalidateSize();
            }, 200);
        }
        
        async function loadDistrictBoundariesForMap(state, districtMap, selectedDistrict) {
            const boundaryFiles = {
                'Alaska': 'data/boundaries/alaska_districts_119th.json',
                'Arizona': 'data/boundaries/arizona_districts_119th.json',
                'California': 'data/boundaries/california_districts_119th.json',
                'Colorado': 'data/boundaries/colorado_districts_119th.json',
                'Connecticut': 'data/boundaries/connecticut_districts_119th.json',
                'Florida': 'data/boundaries/florida_districts_119th.json',
                'Nevada': 'data/boundaries/nevada_districts_119th.json'
            };
            
            const boundaryFile = boundaryFiles[state];
            if (!boundaryFile) {
                console.log('📍 No boundary file configured for state:', state);
                return;
            }
            
            try {
                console.log('📍 Loading district boundaries for map:', state);
                const response = await fetch(boundaryFile);
                
                if (!response.ok) {
                    console.log('📍 Could not load boundary file for', state, '- status:', response.status);
                    return;
                }
                
                const boundariesData = await response.json();
                
                // Add boundaries to the district map
                const districtLayer = L.geoJSON(boundariesData, {
                    style: function(feature) {
                        const districtId = getDistrictId(feature);
                        const isSelected = districtId === selectedDistrict;
                        
                        return {
                            color: isSelected ? '#667eea' : '#999999',
                            weight: isSelected ? 3 : 1,
                            opacity: isSelected ? 0.8 : 0.3,
                            fillColor: isSelected ? '#667eea' : 'transparent',
                            fillOpacity: isSelected ? 0.1 : 0
                        };
                    }
                });
                
                districtLayer.addTo(districtMap);
                
                console.log('📍 Added district boundaries to district map');
                
            } catch (error) {
                console.log('📍 Error loading district boundaries for map:', error);
            }
        }

        function displayDistrictCollegeListWithLocation(container, districtId, withinColleges, nearColleges, userLat, userLng) {
            container.innerHTML = '';
            
            // Sort function
            function sortCollegesByDistance(colleges) {
                if (!userLat || !userLng) return colleges;
                return colleges.slice().sort((a, b) => {
                    if (!a.lat || !a.lng || !b.lat || !b.lng) return 0;
                    const distanceA = calculateDistance(userLat, userLng, a.lat, a.lng);
                    const distanceB = calculateDistance(userLat, userLng, b.lat, b.lng);
                    return distanceA - distanceB;
                });
